<svg width="512" height="512" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Password Manager Icon</title>
  <desc>A sleek shield icon with a padlock and circuit-pattern details</desc>
  <style>
    .shield-outer { fill: #1e2d4a; stroke: #2e6be6; stroke-width: 3; }
    .shield-inner { fill: #162038; stroke: #1a4fa8; stroke-width: 1.5; }
    .accent { fill: #2e6be6; }
    .accent-bright { fill: #5b9fff; }
    .circuit { stroke: #1e4a8a; stroke-width: 1.2; fill: none; }
    .circuit-dot { fill: #1e4a8a; }
    .lock-ring { fill: none; stroke: #2e6be6; stroke-width: 8; stroke-linecap: round; }
    .lock-body { fill: #2e6be6; }
    .lock-highlight { fill: #5b9fff; }
    .bit-dot { fill: #2e6be6; opacity: 0.6; }
  </style>

  <!-- NO background circle — fully transparent -->

  <!-- Subtle circuit traces -->
  <line x1="160" y1="220" x2="220" y2="220" class="circuit"/>
  <line x1="220" y1="220" x2="220" y2="280" class="circuit"/>
  <line x1="460" y1="200" x2="520" y2="200" class="circuit"/>
  <line x1="520" y1="200" x2="520" y2="260" class="circuit"/>
  <line x1="155" y1="430" x2="210" y2="430" class="circuit"/>
  <line x1="210" y1="430" x2="210" y2="490" class="circuit"/>
  <line x1="470" y1="460" x2="530" y2="460" class="circuit"/>
  <line x1="530" y1="400" x2="530" y2="460" class="circuit"/>
  <circle cx="220" cy="220" r="4" class="circuit-dot"/>
  <circle cx="520" cy="200" r="4" class="circuit-dot"/>
  <circle cx="210" cy="430" r="4" class="circuit-dot"/>
  <circle cx="530" cy="460" r="4" class="circuit-dot"/>

  <!-- Binary dots -->
  <circle cx="175" cy="310" r="3" class="bit-dot"/>
  <circle cx="195" cy="330" r="2" class="bit-dot"/>
  <circle cx="175" cy="350" r="3" class="bit-dot"/>
  <circle cx="490" cy="300" r="2" class="bit-dot"/>
  <circle cx="510" cy="320" r="3" class="bit-dot"/>
  <circle cx="490" cy="340" r="2" class="bit-dot"/>
  <circle cx="510" cy="360" r="3" class="bit-dot"/>

  <!-- Shield outer -->
  <path d="M340 130 L510 195 L510 340 Q510 460 340 545 Q170 460 170 340 L170 195 Z"
        class="shield-outer"/>

  <!-- Shield inner -->
  <path d="M340 158 L486 214 L486 340 Q486 440 340 516 Q194 440 194 340 L194 214 Z"
        class="shield-inner"/>

  <!-- Shield edge detail -->
  <path d="M340 158 L486 214 L486 340 Q486 440 340 516 Q194 440 194 340 L194 214 Z"
        fill="none" stroke="#2e6be6" stroke-width="0.8" opacity="0.4"/>

  <!-- Lock shackle -->
  <path d="M295 318 L295 282 A45 45 0 0 1 385 282 L385 318"
        class="lock-ring"/>

  <!-- Lock body -->
  <rect x="270" y="315" width="140" height="105" rx="10" class="lock-body"/>

  <!-- Lock highlight -->
  <rect x="270" y="315" width="140" height="22" rx="10" class="lock-highlight" opacity="0.5"/>

  <!-- Keyhole circle -->
  <circle cx="340" cy="358" r="18" fill="#162038"/>
  <!-- Keyhole slot -->
  <rect x="333" y="366" width="14" height="26" rx="4" fill="#162038"/>

  <!-- Keyhole inner ring -->
  <circle cx="340" cy="358" r="10" fill="none" stroke="#5b9fff" stroke-width="1.5" opacity="0.6"/>

  <!-- Lock face dots -->
  <circle cx="295" cy="358" r="3" fill="#162038" opacity="0.5"/>
  <circle cx="385" cy="358" r="3" fill="#162038" opacity="0.5"/>

  <!-- Shackle shine -->
  <path d="M297 300 A43 43 0 0 1 316 268" fill="none" stroke="#7ab8ff" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>

  <!-- Shield tip accent -->
  <path d="M328 505 Q340 516 352 505" fill="none" stroke="#2e6be6" stroke-width="2" opacity="0.7"/>

  <!-- Corner bolts -->
  <circle cx="218" cy="228" r="5" class="accent" opacity="0.7"/>
  <circle cx="462" cy="228" r="5" class="accent" opacity="0.7"/>
</svg>
